<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ephemeral Chat Rooms</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-orbs">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </div>

    <div class="app-container">

        <!-- ====== JOIN SCREEN ====== -->
        <div id="join-screen" class="screen active">
            <div class="card">
                <div class="card-icon">💬</div>
                <h1>Join a Room</h1>
                <p class="subtitle">Enter a nickname and a room code to connect.</p>
                <div id="join-alert" class="alert hidden"></div>
                <form id="join-form">
                    <div class="field">
                        <label for="join-nickname">Nickname</label>
                        <input type="text" id="join-nickname" placeholder="What should we call you?" required autocomplete="off">
                    </div>
                    <div class="field">
                        <label for="join-roomcode">Room Code</label>
                        <input type="text" id="join-roomcode" placeholder="Enter a secret room code" required autocomplete="off">
                    </div>
                    <button type="submit" class="btn btn-primary" id="join-btn">Join Chat</button>
                </form>
            </div>
        </div>

        <!-- ====== CHAT SCREEN ====== -->
        <div id="chat-screen" class="screen hidden fullscreen">
            <div class="chat-layout">
                <!-- Sidebar -->
                <aside class="sidebar">
                    <div class="sidebar-header">
                        <div class="app-logo">💬 Chat Rooms</div>
                    </div>
                    <div class="sidebar-room">
                        <div class="room-item active">
                            <span class="room-icon">🌐</span>
                            <span id="sidebar-room-name">Room Name</span>
                        </div>
                    </div>
                    <div class="sidebar-footer">
                        <div class="user-badge">
                            <div class="avatar" id="sidebar-avatar"></div>
                            <span id="sidebar-username"></span>
                        </div>
                        <button id="btn-logout" class="btn-icon" title="Disconnect">⏏</button>
                    </div>
                </aside>

                <!-- Main Chat Area -->
                <main class="chat-main">
                    <div class="chat-topbar">
                        <div class="topbar-left">
                            <button id="mobile-menu-btn" class="mobile-menu-btn" title="Toggle Sidebar">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                            </button>
                            <strong><span id="topbar-room-name"># General</span></strong> <span class="status-dot"></span> <span id="online-count" class="online-count">0 online</span>
                        </div>
                        <div class="ephem-badge">⏱ Session ends on disconnect</div>
                    </div>

                    <div class="messages-area" id="messages-area">
                        <div class="welcome-msg">
                            <div class="welcome-icon">🔒</div>
                            <p>This is a live session. Messages are not stored. Once you disconnect, your session ends.</p>
                        </div>
                    </div>

                    <div class="chat-input-bar">
                        <form id="chat-form">
                            <input type="text" id="message-input" placeholder="Type a message..." required autocomplete="off">
                            <button type="submit" class="btn btn-send">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                            </button>
                        </form>
                    </div>
                </main>
            </div>
        </div>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
